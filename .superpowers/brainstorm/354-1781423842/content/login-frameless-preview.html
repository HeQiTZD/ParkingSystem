<h2>登录窗口无边框样式预览</h2>
<p class="subtitle">参考 ConfigInitDialog 的无边框窗口设计，保留左右分栏布局</p>

<div class="mockup">
  <div class="mockup-header">登录窗口预览 - 无边框样式</div>
  <div class="mockup-body" style="padding: 0; background: #f0f0f0; min-height: 500px; display: flex; align-items: center; justify-content: center;">
    <!-- 模拟无边框窗口 -->
    <div style="width: 700px; background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow: hidden;">

      <!-- 标题栏 -->
      <div style="background: #f8f8f8; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e5e5; cursor: move;">
        <div style="width: 60px;"></div>
        <div style="display: flex; gap: 8px;">
          <div style="width: 12px; height: 12px; background: #ffbd2e; border-radius: 50%; cursor: pointer;" title="最小化"></div>
          <div style="width: 12px; height: 12px; background: #ff5f57; border-radius: 50%; cursor: pointer;" title="关闭"></div>
        </div>
      </div>

      <!-- 主内容区域 -->
      <div style="display: flex; min-height: 400px;">
        <!-- 左侧品牌面板 -->
        <div style="width: 300px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px;">
          <div style="width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="white">
              <path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/>
            </svg>
          </div>
          <div style="color: white; font-size: 18px; font-weight: bold; text-align: center;">智慧停车场管理系统</div>
          <div style="color: rgba(255,255,255,0.8); font-size: 12px; margin-top: 8px;">Smart Parking System</div>
        </div>

        <!-- 右侧登录表单 -->
        <div style="flex: 1; padding: 40px 30px; display: flex; flex-direction: column; justify-content: center;">
          <div style="font-size: 24px; font-weight: bold; color: #333; margin-bottom: 8px;">欢迎回来</div>
          <div style="color: #999; font-size: 14px; margin-bottom: 30px;">请登录您的账户</div>

          <!-- 用户名输入框 -->
          <div style="margin-bottom: 20px;">
            <div style="font-size: 12px; color: #666; margin-bottom: 6px;">用户名</div>
            <div style="background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px; padding: 12px; display: flex; align-items: center;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="#999" style="margin-right: 8px;">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
              </svg>
              <span style="color: #999; font-size: 14px;">请输入用户名</span>
            </div>
          </div>

          <!-- 密码输入框 -->
          <div style="margin-bottom: 20px;">
            <div style="font-size: 12px; color: #666; margin-bottom: 6px;">密码</div>
            <div style="background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px; padding: 12px; display: flex; align-items: center;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="#999" style="margin-right: 8px;">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
              </svg>
              <span style="color: #999; font-size: 14px;">请输入密码</span>
            </div>
          </div>

          <!-- 忘记密码 -->
          <div style="text-align: right; margin-bottom: 24px;">
            <span style="color: #667eea; font-size: 12px; cursor: pointer;">忘记密码?</span>
          </div>

          <!-- 登录按钮 -->
          <button style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 14px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s;">
            登 录
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <h3>设计要点</h3>
  <div class="options">
    <div class="option" data-choice="titlebar" onclick="toggleSelect(this)">
      <div class="letter">1</div>
      <div class="content">
        <h3>标题栏</h3>
        <p>无文字标题，仅包含系统按钮（最小化、关闭），支持鼠标拖动移动窗口</p>
      </div>
    </div>
    <div class="option" data-choice="shadow" onclick="toggleSelect(this)">
      <div class="letter">2</div>
      <div class="content">
        <h3>阴影效果</h3>
        <p>使用 QGraphicsDropShadowEffect 添加阴影，营造悬浮效果</p>
      </div>
    </div>
    <div class="option" data-choice="layout" onclick="toggleSelect(this)">
      <div class="letter">3</div>
      <div class="content">
        <h3>左右分栏</h3>
        <p>保留原有的品牌面板和登录表单分栏布局</p>
      </div>
    </div>
  </div>
</div>

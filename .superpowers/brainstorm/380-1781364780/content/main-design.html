<h2>车牌识别系统界面设计</h2>
<p class="subtitle">经典商务风格 - 天蓝色主色调</p>

<div class="section">
  <h3>设计规范</h3>
  <div class="split">
    <div class="mockup">
      <div class="mockup-header">颜色方案</div>
      <div class="mockup-body">
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <div style="width: 80px; height: 60px; background: #3b82f6; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px;">主色调<br>#3b82f6</div>
          <div style="width: 80px; height: 60px; background: #1e40af; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px;">深色<br>#1e40af</div>
          <div style="width: 80px; height: 60px; background: #93c5fd; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #1e3a5f; font-size: 12px;">浅色<br>#93c5fd</div>
          <div style="width: 80px; height: 60px; background: #f8fafc; border-radius: 4px; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; color: #475569; font-size: 12px;">背景<br>#f8fafc</div>
        </div>
      </div>
    </div>
    <div class="mockup">
      <div class="mockup-header">设计元素</div>
      <div class="mockup-body">
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 100px; font-size: 12px; color: #475569;">圆角:</div>
            <div style="width: 60px; height: 30px; background: #3b82f6; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px;">4px</div>
          </div>
          <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 100px; font-size: 12px; color: #475569;">阴影:</div>
            <div style="width: 80px; height: 30px; background: white; border-radius: 4px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; font-size: 12px; color: #475569;">中等</div>
          </div>
          <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 100px; font-size: 12px; color: #475569;">字体:</div>
            <div style="font-size: 14px; color: #1e293b;">微软雅黑</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <h3>登录窗口设计</h3>
  <div class="mockup">
    <div class="mockup-header">分屏登录设计</div>
    <div class="mockup-body" style="height: 300px; padding: 0;">
      <div style="display: flex; height: 100%;">
        <!-- 左侧品牌区域 -->
        <div style="width: 40%; background: linear-gradient(135deg, #1e40af, #3b82f6); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;">
          <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">车牌识别系统</div>
          <div style="font-size: 14px; opacity: 0.8;">智能停车场管理平台</div>
        </div>
        <!-- 右侧表单区域 -->
        <div style="width: 60%; display: flex; align-items: center; justify-content: center; background: white;">
          <div style="width: 80%; max-width: 300px;">
            <div style="font-size: 18px; font-weight: bold; color: #1e293b; margin-bottom: 20px;">用户登录</div>
            <div style="margin-bottom: 15px;">
              <div style="font-size: 12px; color: #64748b; margin-bottom: 5px;">用户名</div>
              <div style="height: 35px; border: 1px solid #e2e8f0; border-radius: 4px; background: #f8fafc;"></div>
            </div>
            <div style="margin-bottom: 20px;">
              <div style="font-size: 12px; color: #64748b; margin-bottom: 5px;">密码</div>
              <div style="height: 35px; border: 1px solid #e2e8f0; border-radius: 4px; background: #f8fafc;"></div>
            </div>
            <div style="display: flex; gap: 10px;">
              <div style="flex: 1; height: 35px; background: #3b82f6; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px;">登录</div>
              <div style="flex: 1; height: 35px; border: 1px solid #e2e8f0; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #64748b;">注册</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

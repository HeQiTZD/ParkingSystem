<h2>ConfigInitDialog 无边框窗口设计 v2</h2>
<p class="subtitle">标题栏白色背景，无文字</p>

<div class="section">
  <h3>窗口布局预览</h3>
  <div class="mockup">
    <div class="mockup-header" style="display:flex; justify-content:flex-end; align-items:center; padding: 0 12px; background: #ffffff; height: 40px; border-bottom: 1px solid #f1f5f9;">
      <div style="display:flex; gap: 2px;">
        <span style="display:inline-flex; align-items:center; justify-content:center; width:36px; height:28px; cursor:pointer; font-size:14px; border-radius:4px; color:#94a3b8; transition: all 0.2s;" class="mock-minimize">─</span>
        <span style="display:inline-flex; align-items:center; justify-content:center; width:36px; height:28px; cursor:pointer; font-size:14px; border-radius:4px; color:#94a3b8; transition: all 0.2s;" class="mock-close">×</span>
      </div>
    </div>
    <div class="mockup-body" style="padding: 20px; background: #ffffff; min-height: 300px;">
      <div style="text-align:center; margin-bottom:20px;">
        <div style="font-size:18px; font-weight:bold; color:#1a1a2e; padding:10px 0;">停车场数据初始化</div>
        <div style="color:#64748b; font-size:13px;">请配置数据库连接和停车场基本信息</div>
      </div>
      <div style="border-bottom:2px solid #3b82f6; padding:8px 0; margin:10px 0; color:#1a1a2e; font-weight:600;">数据库配置</div>
      <div style="display:grid; grid-template-columns:80px 1fr; gap:12px; align-items:center;">
        <span style="color:#475569; font-size:14px;">IP地址</span>
        <div style="border:1px solid #e2e8f0; border-radius:6px; padding:10px 14px; background:#f8fafc; color:#94a3b8;">请输入IP地址</div>
        <span style="color:#475569; font-size:14px;">端口</span>
        <div style="border:1px solid #e2e8f0; border-radius:6px; padding:10px 14px; background:#f8fafc; color:#94a3b8;">请输入端口号</div>
      </div>
      <div style="margin-top:20px; text-align:center;">
        <span style="display:inline-block; background:#3b82f6; color:white; padding:10px 24px; border-radius:6px; font-weight:600; margin-right:12px;">确认提交</span>
        <span style="display:inline-block; border:1px solid #e2e8f0; color:#475569; padding:10px 24px; border-radius:6px;">取消</span>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <h3>标题栏细节</h3>
  <div class="split">
    <div class="mockup">
      <div class="mockup-header">默认状态</div>
      <div class="mockup-body" style="padding:16px;">
        <div style="display:flex; justify-content:flex-end; align-items:center; background:#ffffff; border:1px solid #e2e8f0; padding:8px 12px; border-radius:6px;">
          <div style="display:flex; gap:2px;">
            <div style="color:#94a3b8; width:36px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:4px; font-size:14px;">─</div>
            <div style="color:#94a3b8; width:36px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:4px; font-size:14px;">×</div>
          </div>
        </div>
        <p style="text-align:center; color:#94a3b8; font-size:12px; margin-top:8px;">按钮颜色：#94a3b8（灰色）</p>
      </div>
    </div>
    <div class="mockup">
      <div class="mockup-header">悬浮状态</div>
      <div class="mockup-body" style="padding:16px;">
        <div style="display:flex; justify-content:flex-end; align-items:center; background:#ffffff; border:1px solid #e2e8f0; padding:8px 12px; border-radius:6px;">
          <div style="display:flex; gap:2px;">
            <div style="background:#f1f5f9; color:#64748b; width:36px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:4px; font-size:14px;">─</div>
            <div style="background:#ef4444; color:white; width:36px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:4px; font-size:14px;">×</div>
          </div>
        </div>
        <p style="text-align:center; color:#94a3b8; font-size:12px; margin-top:8px;">最小化：#f1f5f9 浅灰 | 关闭：#ef4444 红色</p>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <div class="options">
    <div class="option" data-choice="confirmed" onclick="toggleSelect(this)">
      <div class="letter">✓</div>
      <div class="content">
        <h3>设计已确认</h3>
        <p>白色标题栏，无文字，仅右侧最小化和关闭按钮。默认灰色，悬浮时最小化变浅灰、关闭变红色。</p>
      </div>
    </div>
  </div>
</div>

<h2>注册窗口预览</h2>
<p class="subtitle">RegisterWindow - 780×540 固定大小</p>

<div class="mockup">
  <div class="mockup-header">注册窗口 (780×540)</div>
  <div class="mockup-body" style="height: 450px; display: flex; background: #f5f7fa;">
    <div style="width: 40%; background: linear-gradient(135deg, #00AA7F 0%, #008866 100%); display: flex; align-items: center; justify-content: center;">
      <div style="text-align: center; color: white;">
        <div style="font-size: 48px; margin-bottom: 10px;">📝</div>
        <div style="font-size: 20px; font-weight: bold;">用户注册</div>
        <div style="font-size: 14px; margin-top: 5px; opacity: 0.8;">创建新账户</div>
      </div>
    </div>
    <div style="width: 60%; display: flex; align-items: center; justify-content: center; padding: 30px;">
      <div style="width: 100%; max-width: 350px;">
        <div style="font-size: 18px; font-weight: bold; color: #333; margin-bottom: 25px; text-align: center;">用户注册</div>
        <div style="margin-bottom: 15px;">
          <div style="font-size: 13px; color: #666; margin-bottom: 6px;">用户名</div>
          <input class="mock-input" placeholder="请输入用户名" style="width: 100%; height: 40px; border-radius: 7px; background: #f7f7f7;">
        </div>
        <div style="margin-bottom: 15px;">
          <div style="font-size: 13px; color: #666; margin-bottom: 6px;">密码</div>
          <input class="mock-input" type="password" placeholder="请输入密码" style="width: 100%; height: 40px; border-radius: 7px; background: #f7f7f7;">
        </div>
        <div style="margin-bottom: 15px;">
          <div style="font-size: 13px; color: #666; margin-bottom: 6px;">确认密码</div>
          <input class="mock-input" type="password" placeholder="请再次输入密码" style="width: 100%; height: 40px; border-radius: 7px; background: #f7f7f7;">
        </div>
        <div style="display: flex; gap: 15px; margin-bottom: 20px;">
          <div style="flex: 1;">
            <div style="font-size: 13px; color: #666; margin-bottom: 6px;">姓名</div>
            <input class="mock-input" placeholder="请输入姓名" style="width: 100%; height: 40px; border-radius: 7px; background: #f7f7f7;">
          </div>
          <div style="flex: 1;">
            <div style="font-size: 13px; color: #666; margin-bottom: 6px;">手机号</div>
            <input class="mock-input" placeholder="请输入手机号" style="width: 100%; height: 40px; border-radius: 7px; background: #f7f7f7;">
          </div>
        </div>
        <div style="display: flex; gap: 20px;">
          <button class="mock-button" style="flex: 1; height: 45px; background: #00AA7F; color: white; border-radius: 7px; font-size: 14px;">返回</button>
          <button class="mock-button" style="flex: 1; height: 45px; background: #00AA7F; color: white; border-radius: 7px; font-size: 14px;">确认</button>
        </div>
      </div>
    </div>
  </div>
</div>

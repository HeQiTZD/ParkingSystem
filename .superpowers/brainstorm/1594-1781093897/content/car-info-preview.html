<h2>车辆信息页面预览</h2>
<p class="subtitle">Page 1 - 车库信息系统</p>

<div class="mockup">
  <div class="mockup-header">车辆信息页面</div>
  <div class="mockup-body" style="height: 500px; display: flex; background: #f5f7fa;">
    <!-- 左侧导航栏 -->
    <div style="width: 60px; background: #2C3E50; display: flex; flex-direction: column; align-items: center; padding-top: 20px;">
      <div style="width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; opacity: 0.7;">
        <span style="font-size: 18px;">🏠</span>
      </div>
      <div style="width: 40px; height: 40px; background: #34495E; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border-left: 3px solid #4A90E2;">
        <span style="font-size: 18px;">🚗</span>
      </div>
      <div style="width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; opacity: 0.7;">
        <span style="font-size: 18px;">👥</span>
      </div>
      <div style="width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; opacity: 0.7;">
        <span style="font-size: 18px;">📷</span>
      </div>
    </div>
    <!-- 右侧内容区域 -->
    <div style="flex: 1; padding: 20px; display: flex; flex-direction: column;">
      <div style="font-size: 20px; font-weight: bold; color: #333; margin-bottom: 20px;">车库信息系统</div>
      <!-- 查询区域 -->
      <div style="background: white; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <div style="display: flex; gap: 15px; align-items: center;">
          <input class="mock-input" placeholder="查询的车牌号" style="flex: 1; height: 40px; border-radius: 6px;">
          <input class="mock-input" type="date" value="2023-01-01" style="width: 150px; height: 40px; border-radius: 6px;">
          <input class="mock-input" type="date" value="2024-01-01" style="width: 150px; height: 40px; border-radius: 6px;">
          <button class="mock-button" style="height: 40px; padding: 0 20px; background: #4A90E2; color: white; border-radius: 6px;">查询</button>
          <button class="mock-button" style="height: 40px; padding: 0 20px; background: #999; color: white; border-radius: 6px;">重置</button>
        </div>
      </div>
      <!-- 表格区域 -->
      <div style="flex: 1; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <table style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr style="background: #f5f7fa;">
              <th style="padding: 12px 15px; text-align: left; font-weight: 600; color: #333; border-bottom: 1px solid #e0e0e0;">ID</th>
              <th style="padding: 12px 15px; text-align: left; font-weight: 600; color: #333; border-bottom: 1px solid #e0e0e0;">车牌号</th>
              <th style="padding: 12px 15px; text-align: left; font-weight: 600; color: #333; border-bottom: 1px solid #e0e0e0;">入库时间</th>
              <th style="padding: 12px 15px; text-align: left; font-weight: 600; color: #333; border-bottom: 1px solid #e0e0e0;">出库时间</th>
              <th style="padding: 12px 15px; text-align: left; font-weight: 600; color: #333; border-bottom: 1px solid #e0e0e0;">费用</th>
              <th style="padding: 12px 15px; text-align: left; font-weight: 600; color: #333; border-bottom: 1px solid #e0e0e0;">状态</th>
            </tr>
          </thead>
          <tbody>
            <tr style="background: #e8f0fe;">
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;">1</td>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;">京A12345</td>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;">2026-06-10 08:30</td>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;">--</td>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;">--</td>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;"><span style="background: #00AA7F; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px;">在场</span></td>
            </tr>
            <tr>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;">2</td>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;">京B45678</td>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;">2026-06-09 14:20</td>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;">2026-06-10 09:15</td>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;">¥25.00</td>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;"><span style="background: #999; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px;">离场</span></td>
            </tr>
            <tr>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;">3</td>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;">京C78901</td>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;">2026-06-10 10:00</td>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;">--</td>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;">--</td>
              <td style="padding: 12px 15px; border-bottom: 1px solid #e0e0e0;"><span style="background: #00AA7F; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px;">在场</span></td>
            </tr>
          </tbody>
        </table>
      </div>
      <!-- 操作栏 -->
      <div style="margin-top: 15px; display: flex; justify-content: flex-end; gap: 10px;">
        <button class="mock-button" style="height: 40px; padding: 0 20px; background: #E74C3C; color: white; border-radius: 6px;">删除选中</button>
        <button class="mock-button" style="height: 40px; padding: 0 20px; background: #4A90E2; color: white; border-radius: 6px;">导出数据</button>
      </div>
    </div>
  </div>
</div>

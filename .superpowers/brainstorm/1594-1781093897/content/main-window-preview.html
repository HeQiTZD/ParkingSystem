<h2>主功能界面预览</h2>
<p class="subtitle">CarWindow - 1482×715，左侧可折叠导航栏</p>

<div class="options">
  <div class="option" data-choice="home" onclick="toggleSelect(this)">
    <div class="letter">🏠</div>
    <div class="content">
      <h3>主页</h3>
      <p>摄像头预览 + 统计卡片 + 入库/出库操作</p>
    </div>
  </div>
  <div class="option" data-choice="cars" onclick="toggleSelect(this)">
    <div class="letter">🚗</div>
    <div class="content">
      <h3>车辆信息</h3>
      <p>车辆进出记录查询和管理</p>
    </div>
  </div>
  <div class="option" data-choice="admin" onclick="toggleSelect(this)">
    <div class="letter">👥</div>
    <div class="content">
      <h3>管理页面</h3>
      <p>用户管理（管理员可见）</p>
    </div>
  </div>
  <div class="option" data-choice="camera" onclick="toggleSelect(this)">
    <div class="letter">📷</div>
    <div class="content">
      <h3>摄像头页面</h3>
      <p>摄像头设置和实时预览</p>
    </div>
  </div>
</div>

<div class="section">
  <h3>主功能界面 - 主页布局</h3>
  <div class="mockup">
    <div class="mockup-header">CarWindow - 主页 (摄像头中心布局)</div>
    <div class="mockup-body" style="height: 500px; display: flex; background: #f5f7fa;">
      <!-- 左侧导航栏 -->
      <div style="width: 60px; background: #2C3E50; display: flex; flex-direction: column; align-items: center; padding-top: 20px;">
        <div style="width: 40px; height: 40px; background: #34495E; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border-left: 3px solid #4A90E2;">
          <span style="font-size: 18px;">🏠</span>
        </div>
        <div style="width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; opacity: 0.7;">
          <span style="font-size: 18px;">🚗</span>
        </div>
        <div style="width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; opacity: 0.7;">
          <span style="font-size: 18px;">👥</span>
        </div>
        <div style="width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; opacity: 0.7;">
          <span style="font-size: 18px;">📷</span>
        </div>
        <div style="margin-top: auto; margin-bottom: 20px;">
          <div style="width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; opacity: 0.5;">
            <span style="font-size: 14px;">◀</span>
          </div>
        </div>
      </div>
      <!-- 右侧内容区域 -->
      <div style="flex: 1; padding: 20px; display: flex; flex-direction: column;">
        <!-- 摄像头预览区域 -->
        <div style="background: #e0e0e0; height: 250px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
          <div style="text-align: center; color: #999;">
            <div style="font-size: 48px; margin-bottom: 10px;">📹</div>
            <div>摄像头预览区域 (500×250)</div>
          </div>
        </div>
        <!-- 统计卡片 -->
        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
          <div style="flex: 1; background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <div style="font-size: 14px; color: #666; margin-bottom: 10px;">在场车辆</div>
            <div style="font-size: 36px; font-weight: bold; color: #4A90E2;">156</div>
            <div style="font-size: 14px; color: #999; margin-top: 5px;">/ 500</div>
          </div>
          <div style="flex: 1; background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <div style="font-size: 14px; color: #666; margin-bottom: 10px;">车位剩余</div>
            <div style="font-size: 36px; font-weight: bold; color: #00AA7F;">344</div>
            <div style="font-size: 14px; color: #999; margin-top: 5px;">/ 500</div>
          </div>
        </div>
        <!-- 入库/出库操作栏 -->
        <div style="background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
          <div style="display: flex; gap: 20px; align-items: center;">
            <div style="flex: 1;">
              <input class="mock-input" placeholder="入库车牌号" style="width: 100%; height: 40px; border-radius: 6px;">
            </div>
            <button class="mock-button" style="height: 40px; padding: 0 20px; background: #4A90E2; color: white; border-radius: 6px;">入库</button>
            <div style="flex: 1;">
              <input class="mock-input" placeholder="出库车牌号" style="width: 100%; height: 40px; border-radius: 6px;">
            </div>
            <button class="mock-button" style="height: 40px; padding: 0 20px; background: #4A90E2; color: white; border-radius: 6px;">出库</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<h2>停车场管理系统 - 界面预览</h2>
<p class="subtitle">基于设计文档生成的界面效果图</p>

<div class="options">
  <div class="option" data-choice="login" onclick="toggleSelect(this)">
    <div class="letter">1</div>
    <div class="content">
      <h3>登录窗口</h3>
      <p>781×543 固定大小，蓝色渐变背景</p>
    </div>
  </div>
  <div class="option" data-choice="register" onclick="toggleSelect(this)">
    <div class="letter">2</div>
    <div class="content">
      <h3>注册窗口</h3>
      <p>780×540 固定大小，5个输入字段</p>
    </div>
  </div>
  <div class="option" data-choice="main" onclick="toggleSelect(this)">
    <div class="letter">3</div>
    <div class="content">
      <h3>主功能界面</h3>
      <p>1482×715，左侧可折叠导航</p>
    </div>
  </div>
  <div class="option" data-choice="config" onclick="toggleSelect(this)">
    <div class="letter">4</div>
    <div class="content">
      <h3>配置初始化窗口</h3>
      <p>629×591，数据库配置表单</p>
    </div>
  </div>
</div>

<div class="section">
  <h3>登录窗口预览</h3>
  <div class="mockup">
    <div class="mockup-header">MainWindow - 登录窗口 (781×543)</div>
    <div class="mockup-body" style="height: 400px; display: flex; background: #f5f7fa;">
      <div style="width: 45%; background: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%); display: flex; align-items: center; justify-content: center;">
        <div style="text-align: center; color: white;">
          <div style="font-size: 48px; margin-bottom: 10px;">🚗</div>
          <div style="font-size: 24px; font-weight: bold;">停车场管理系统</div>
          <div style="font-size: 14px; margin-top: 5px; opacity: 0.8;">Parking Management System</div>
        </div>
      </div>
      <div style="width: 55%; display: flex; align-items: center; justify-content: center; padding: 40px;">
        <div style="width: 100%; max-width: 300px;">
          <div style="font-size: 20px; font-weight: bold; color: #333; margin-bottom: 30px; text-align: center;">账户登录</div>
          <div style="margin-bottom: 20px;">
            <div style="font-size: 14px; color: #666; margin-bottom: 8px;">账户</div>
            <input class="mock-input" placeholder="请输入用户名" style="width: 100%; height: 45px; border-radius: 7px; background: #f7f7f7;">
          </div>
          <div style="margin-bottom: 30px;">
            <div style="font-size: 14px; color: #666; margin-bottom: 8px;">密码</div>
            <input class="mock-input" type="password" placeholder="请输入密码" style="width: 100%; height: 45px; border-radius: 7px; background: #f7f7f7;">
          </div>
          <div style="display: flex; gap: 20px;">
            <button class="mock-button" style="flex: 1; height: 45px; background: linear-gradient(90deg, #4A90E2, #fff); color: white; border-radius: 7px; font-size: 14px;">注册</button>
            <button class="mock-button" style="flex: 1; height: 45px; background: linear-gradient(90deg, #4A90E2, #fff); color: white; border-radius: 7px; font-size: 14px;">登陆</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
